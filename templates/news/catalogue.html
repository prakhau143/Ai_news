{% extends "base.html" %}
{% load static %}
{% block title %}News Catalogue — AI News{% endblock %}

{% block extra_css %}
<style>
/* ── Page header ─────────────────────────────────────────────── */
.cat-header{
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#4c1d95 100%);
  padding:24px 28px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.cat-header h1{margin:0;font-size:1.5rem;font-weight:800;color:#fff;}
.cat-header p{margin:0;opacity:.65;font-size:.85rem;color:#c4b5fd;}
.btn-refresh{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;padding:8px 20px;border-radius:20px;cursor:pointer;
  font-size:.85rem;font-weight:600;transition:.2s;
}
.btn-refresh:hover{background:rgba(255,255,255,.22);}
.btn-refresh:disabled{opacity:.45;cursor:not-allowed;}

/* ── Masonry grid ─────────────────────────────────────────────── */
.news-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-auto-rows:190px;
  gap:12px;
  padding:16px 20px;
  max-width:1600px;margin:0 auto;
}

/* ── Card ─────────────────────────────────────────────────────── */
.news-card{
  position:relative;overflow:hidden;border-radius:16px;
  cursor:pointer;
  transition:transform .25s,box-shadow .25s;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.1);
  backface-visibility:hidden;
  -webkit-font-smoothing:antialiased;
}
.news-card:hover{
  transform:translateY(-7px);
  box-shadow:0 20px 40px rgba(0,0,0,.65);
  border-color:rgba(255,255,255,.22);
}

/* Gradient fill — no external image needed */
.card-gradient{
  width:100%;height:100%;
  display:flex;align-items:flex-start;justify-content:flex-start;
  position:relative;padding:12px;
}

/* Large background icon */
.card-icon{
  position:absolute;right:12px;bottom:52px;
  font-size:3.2rem;opacity:.15;line-height:1;z-index:1;
  pointer-events:none;
}

/* Company logo badge */
.logo-badge{
  background:rgba(0,0,0,.55);
  color:#fff;font-size:.68rem;font-weight:800;
  letter-spacing:.05em;padding:5px 10px;
  border-radius:8px;border:1px solid rgba(255,255,255,.2);
  white-space:nowrap;text-transform:uppercase;
  position:relative;z-index:5;
}

/* Tag badge */
.tag-badge{
  position:absolute;top:10px;right:10px;
  font-size:.65rem;font-weight:700;
  padding:4px 10px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.04em;z-index:5;
}
.tag-new     {background:rgba(46,204,113,.85);color:#fff;}
.tag-hot     {background:rgba(231,76,60,.85);color:#fff;}
.tag-trending{background:rgba(241,196,15,.9);color:#111;}

/* Text overlay — dark gradient, no blur */
.overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:14px;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.45) 65%,transparent 100%);
  z-index:3;
}
.card-title{
  font-size:13px;font-weight:600;color:#fff;line-height:1.35;
  text-shadow:0 1px 3px rgba(0,0,0,.7);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-meta{
  font-size:10px;color:rgba(255,255,255,.7);margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Span classes */
.span-big {grid-column:span 3;grid-row:span 2;}
.span-big .card-title{font-size:18px;-webkit-line-clamp:4;}
.span-wide{grid-column:span 3;}
.span-tall{grid-row:span 2;}
.span-small{grid-column:span 2;}

/* Skeleton */
.skeleton{
  background:linear-gradient(90deg,#1e2332 25%,#2a3145 50%,#1e2332 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty state */
.empty-state{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:#64748b;
}
.empty-state .emoji{font-size:4rem;display:block;margin-bottom:16px;}
.empty-state h3{color:#94a3b8;margin-bottom:8px;}

/* ── Article modal ──────────────────────────────────────────── */
#articleModal{
  display:none;position:fixed;z-index:9999;inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;
}
.modal-box{
  background:#0f172a;border:1px solid rgba(255,255,255,.1);
  border-radius:24px;width:92%;max-width:820px;max-height:88vh;
  overflow-y:auto;position:relative;color:#e2e8f0;
  scrollbar-width:thin;scrollbar-color:#334 transparent;
}
.modal-hero{
  width:100%;height:240px;object-fit:cover;
  border-radius:24px 24px 0 0;display:block;
}
.modal-hero-gradient{
  height:200px;border-radius:24px 24px 0 0;
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;
}
.modal-body-inner{padding:28px 32px 32px;}
.modal-headline{font-size:1.4rem;font-weight:800;color:#fff;line-height:1.35;margin:0 0 10px;}
.modal-meta-row{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;}
.modal-content-text{font-size:.95rem;line-height:1.8;color:#cbd5e1;}
.modal-content-text p{margin-bottom:1rem;}
.modal-content-text a{color:#818cf8;}
.btn-source{
  display:inline-flex;align-items:center;gap:8px;margin-top:20px;
  background:linear-gradient(135deg,#7c3aed,#4c1d95);
  color:#fff;padding:10px 22px;border-radius:20px;
  text-decoration:none;font-size:.85rem;font-weight:700;
  transition:opacity .2s;
}
.btn-source:hover{opacity:.85;color:#fff;}
.modal-close{
  position:absolute;top:14px;right:16px;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);
  color:#fff;width:36px;height:36px;border-radius:50%;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;z-index:10;
}
.modal-close:hover{background:rgba(255,255,255,.2);}
.modal-spinner{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:60px 20px;color:#64748b;
}
.spinner-ring{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.08);
  border-top-color:#7c3aed;
  border-radius:50%;animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width:1200px){
  .news-grid{grid-template-columns:repeat(4,1fr);}
  .span-big{grid-column:span 2;}
  .span-wide{grid-column:span 2;}
  .span-small{grid-column:span 1;}
}
@media(max-width:768px){
  .news-grid{grid-template-columns:1fr 1fr;grid-auto-rows:200px;}
  .span-big,.span-wide,.span-tall,.span-small{grid-column:span 1;grid-row:span 1;}
  .span-big .card-title{font-size:14px;}
}
@media(max-width:480px){.news-grid{grid-template-columns:1fr;}}
</style>
{% endblock %}

{% block content %}
<div class="cat-header">
  <div>
    <h1>🧠 AI News Catalogue</h1>
    <p id="newsCount">Loading latest AI headlines…</p>
  </div>
  <button id="btnRefresh" class="btn-refresh" onclick="loadNews(true)">⟳ Refresh</button>
</div>

<div class="news-grid" id="newsGrid">
  <!-- populated by JS -->
</div>

<!-- Article modal -->
<div id="articleModal" style="display:none;position:fixed;z-index:9999;inset:0;
     background:rgba(0,0,0,.85);align-items:center;justify-content:center;">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()" title="Close">✕</button>
    <div id="modalHero"></div>
    <div class="modal-body-inner">
      <div id="modalContent">
        <div class="modal-spinner">
          <div class="spinner-ring"></div>
          <span>Loading article…</span>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const NEWS_API    = "{% url 'fetch_real_ai_news' %}";
const ARTICLE_API = "{% url 'generate_article_content' %}";
const CSRF        = "{{ csrf_token }}";
const CACHE_KEY   = "ai_news_v6";
const CACHE_TS    = "ai_news_v6_ts";
const CACHE_TTL   = 2 * 60 * 60 * 1000; // 2 hours

const LAYOUT = [
  ["span-big","span-wide","span-wide","span-small","span-small","span-small"],
  ["span-wide","span-wide","span-big","span-small","span-small","span-small"],
  ["span-tall","span-tall","span-wide","span-wide","span-small","span-small"],
  ["span-wide","span-small","span-small","span-big","span-wide","span-small"],
];

function layoutClass(i){
  const pat = LAYOUT[Math.floor(i/6) % LAYOUT.length];
  return pat[i % 6] || "span-small";
}
function timeAgo(iso){
  if(!iso) return "";
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)  return "just now";
  if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}
function esc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function tagClass(t){return t==="HOT"?"tag-hot":t==="TRENDING"?"tag-trending":"tag-new";}

function createCard(n, i){
  const lc = layoutClass(i);
  const t  = n.theme || {gradient:"linear-gradient(135deg,#334155,#0f172a)",icon:"📰",logo:"AI"};
  const tag= (n.tag||"NEW").toUpperCase();
  const card = document.createElement("div");
  card.className = "news-card "+lc;
  card.innerHTML = `
    <div class="card-gradient" style="background:${t.gradient}">
      <span class="logo-badge">${esc(t.logo)}</span>
      <span class="tag-badge ${tagClass(tag)}">${tag}</span>
      <div class="card-icon">${t.icon}</div>
      <div class="overlay">
        <div class="card-title">${esc(n.title)}</div>
        <div class="card-meta">${esc(n.source||"")}${n.published_at?" · "+timeAgo(n.published_at):""}</div>
      </div>
    </div>`;
  card.addEventListener("click", ()=>openArticle(n, t));
  return card;
}

function renderGrid(arr){
  const grid = document.getElementById("newsGrid");
  grid.innerHTML = "";
  if(!arr||!arr.length){
    grid.innerHTML=`<div class="empty-state"><span class="emoji">📡</span><h3>No AI news yet</h3><p>The agent is fetching headlines — check back in a minute.</p></div>`;
    return;
  }
  const frag = document.createDocumentFragment();
  arr.forEach((n,i)=>frag.appendChild(createCard(n,i)));
  grid.appendChild(frag);
  document.getElementById("newsCount").textContent=`${arr.length} articles loaded`;
}

async function loadNews(forceRefresh=false){
  const btn=document.getElementById("btnRefresh");
  if(btn) btn.disabled=true;

  if(!forceRefresh){
    try{
      const raw=localStorage.getItem(CACHE_KEY);
      const ts =localStorage.getItem(CACHE_TS);
      if(raw&&ts&&Date.now()-parseInt(ts)<CACHE_TTL){
        renderGrid(JSON.parse(raw));
        if(btn) btn.disabled=false;
        return;
      }
    }catch(_){}
  }

  // Skeletons
  const grid=document.getElementById("newsGrid");
  grid.innerHTML="";
  for(let i=0;i<12;i++){
    const sk=document.createElement("div");
    sk.className="news-card skeleton "+layoutClass(i);
    grid.appendChild(sk);
  }

  try{
    const res  = await fetch(NEWS_API);
    const data = await res.json();
    if(!data.success) throw new Error(data.error||"API error");
    try{
      localStorage.setItem(CACHE_KEY,JSON.stringify(data.news));
      localStorage.setItem(CACHE_TS,String(Date.now()));
    }catch(_){}
    renderGrid(data.news);
    const cnt=document.getElementById("newsCount");
    if(cnt) cnt.textContent=`${data.news.length} articles — ${data.fresh_count} fresh today`;
  }catch(err){
    console.error(err);
    grid.innerHTML=`<div class="empty-state"><span class="emoji">⚠️</span><h3>Could not load news</h3><p>${esc(err.message)}</p><button class="btn-refresh" onclick="loadNews(true)" style="margin-top:12px">Try again</button></div>`;
  }finally{
    if(btn) btn.disabled=false;
  }
}

async function openArticle(n, theme){
  const modal=document.getElementById("articleModal");
  const hero =document.getElementById("modalHero");
  const cont =document.getElementById("modalContent");
  modal.style.display="flex";
  document.getElementById("modalBox").scrollTop=0;

  // Hero
  if(n.image_url){
    hero.innerHTML=`<img src="${esc(n.image_url)}" class="modal-hero" onerror="this.style.display='none'" alt="">`;
  } else {
    hero.innerHTML=`<div class="modal-hero-gradient" style="background:${theme.gradient}">${theme.icon}</div>`;
  }

  // Spinner
  cont.innerHTML=`<div class="modal-spinner"><div class="spinner-ring"></div><span>Claude is writing the article…</span></div>`;

  try{
    const res=await fetch(ARTICLE_API,{
      method:"POST",
      headers:{"Content-Type":"application/json","X-CSRFToken":CSRF},
      body:JSON.stringify({title:n.title,summary:n.summary,category:n.category,url:n.url||""}),
    });
    const d=await res.json();
    if(!d.success) throw new Error(d.error||"generation failed");
    cont.innerHTML=`
      <h2 class="modal-headline">${esc(n.title)}</h2>
      <div class="modal-meta-row">
        <span>🏷 ${esc(n.category)}</span>
        <span>📰 ${esc(n.source||"AI News")}</span>
        ${n.published_at?`<span>🕒 ${timeAgo(n.published_at)}</span>`:""}
        <span style="color:#818cf8;font-size:.72rem">${d.source==="claude"?"✨ AI written":d.source==="scraped"?"🔗 Scraped":"📋 Summary"}</span>
      </div>
      <div class="modal-content-text">${d.content}</div>
      ${n.url&&n.url!="#"?`<a class="btn-source" href="${esc(n.url)}" target="_blank" rel="noopener">Read original →</a>`:""}`;
  }catch(err){
    cont.innerHTML=`<p style="color:#f87171;padding:10px 0">${esc(err.message)}</p>`;
  }
}

function closeModal(){
  document.getElementById("articleModal").style.display="none";
}
document.getElementById("articleModal").addEventListener("click",e=>{
  if(e.target===e.currentTarget) closeModal();
});
document.addEventListener("keydown",e=>{if(e.key==="Escape") closeModal();});
document.addEventListener("DOMContentLoaded",()=>loadNews());
</script>
{% endblock %}
